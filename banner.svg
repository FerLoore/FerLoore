<svg width="860" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip paths for typing effect on each character group -->
    <clipPath id="clip-title">
      <rect x="0" y="90" width="0" height="50">
        <animate attributeName="width" from="0" to="860" dur="2s" begin="0.5s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="clip-subtitle">
      <rect x="0" y="140" width="0" height="30">
        <animate attributeName="width" from="0" to="860" dur="1.5s" begin="2.8s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="clip-prompt">
      <rect x="0" y="60" width="0" height="25">
        <animate attributeName="width" from="0" to="300" dur="0.8s" begin="0s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" fill="url(#bg)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="40" x2="860" y2="40" stroke="#21262d" stroke-width="0.5"/>
  <line x1="0" y1="80" x2="860" y2="80" stroke="#21262d" stroke-width="0.5"/>
  <line x1="0" y1="120" x2="860" y2="120" stroke="#21262d" stroke-width="0.5"/>
  <line x1="0" y1="160" x2="860" y2="160" stroke="#21262d" stroke-width="0.5"/>

  <!-- Grid lines vertical -->
  <line x1="86" y1="0" x2="86" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="172" y1="0" x2="172" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="258" y1="0" x2="258" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="344" y1="0" x2="344" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="430" y1="0" x2="430" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="516" y1="0" x2="516" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="602" y1="0" x2="602" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="688" y1="0" x2="688" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="774" y1="0" x2="774" y2="200" stroke="#21262d" stroke-width="0.5"/>

  <!-- Green accent left bar -->
  <rect x="0" y="0" width="3" height="200" fill="#3fb950"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="860" height="32" fill="#161b22"/>
  <circle cx="20" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="16" r="5" fill="#febc2e"/>
  <circle cx="52" cy="16" r="5" fill="#28c840"/>
  <text x="430" y="21" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">FerLoore — bash — 120×40</text>

  <!-- Prompt line (types first) -->
  <text x="40" y="68" font-family="'Courier New', monospace" font-size="13" fill="#8b949e" clip-path="url(#clip-prompt)">~/FerLoore <tspan fill="#3fb950">$</tspan></text>

  <!-- Main title with typing effect -->
  <text x="430" y="122" font-family="'Courier New', monospace" font-size="38" font-weight="bold"
    fill="#3fb950" text-anchor="middle" filter="url(#glow)" clip-path="url(#clip-title)">~/FerLoore $</text>

  <!-- Subtitle with typing effect -->
  <text x="430" y="152" font-family="'Courier New', monospace" font-size="13"
    fill="#8b949e" text-anchor="middle" clip-path="url(#clip-subtitle)">Full Stack Dev · BDD · TypeScript · Node.js</text>

  <!-- Cursor after title — blinks while typing, stays after -->
  <rect x="634" y="100" width="10" height="26" fill="#3fb950">
    <!-- Move cursor from right of title to final position -->
    <animate attributeName="opacity" values="1;1;0;0" dur="0.6s" begin="2.5s" fill="freeze"/>
  </rect>

  <!-- Cursor after subtitle — appears and blinks -->
  <rect x="648" y="138" width="8" height="18" fill="#8b949e" opacity="0">
    <animate attributeName="opacity" values="0;1;0;1;0;1" dur="1s" begin="4.3s" fill="freeze" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom accent line — slides in -->
  <rect x="0" y="196" width="0" height="4" fill="#3fb950" opacity="0.7">
    <animate attributeName="width" from="0" to="860" dur="0.6s" begin="0s" fill="freeze"/>
  </rect>

  <!-- Corner decorations — fade in -->
  <text x="810" y="190" font-family="monospace" font-size="10" fill="#3d4a5c" opacity="0">
    v2.0.1
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4s" fill="freeze"/>
  </text>
  <text x="15" y="190" font-family="monospace" font-size="10" fill="#3d4a5c" opacity="0">
    1011000101010
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4s" fill="freeze"/>
  </text>
</svg>
