<svg width="860" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" fill="url(#bg)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="40" x2="860" y2="40" stroke="#21262d" stroke-width="0.5"/>
  <line x1="0" y1="80" x2="860" y2="80" stroke="#21262d" stroke-width="0.5"/>
  <line x1="0" y1="120" x2="860" y2="120" stroke="#21262d" stroke-width="0.5"/>
  <line x1="0" y1="160" x2="860" y2="160" stroke="#21262d" stroke-width="0.5"/>

  <!-- Grid lines vertical -->
  <line x1="86" y1="0" x2="86" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="172" y1="0" x2="172" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="258" y1="0" x2="258" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="344" y1="0" x2="344" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="430" y1="0" x2="430" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="516" y1="0" x2="516" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="602" y1="0" x2="602" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="688" y1="0" x2="688" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="774" y1="0" x2="774" y2="200" stroke="#21262d" stroke-width="0.5"/>

  <!-- Green accent left bar -->
  <rect x="0" y="0" width="3" height="200" fill="#3fb950"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="860" height="32" fill="#161b22"/>
  <circle cx="20" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="16" r="5" fill="#febc2e"/>
  <circle cx="52" cy="16" r="5" fill="#28c840"/>
  <text x="430" y="21" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">FerLoore — bash — 120×40</text>

  <!-- Prompt line -->
  <text x="40" y="82" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">~/FerLoore</text>
  <text x="118" y="82" font-family="'Courier New', monospace" font-size="13" fill="#3fb950"> $</text>

  <!-- Main title -->
  <text x="430" y="122" font-family="'Courier New', monospace" font-size="38" font-weight="bold"
    fill="#3fb950" text-anchor="middle" filter="url(#glow)">~/FerLoore $</text>

  <!-- Subtitle -->
  <text x="430" y="152" font-family="'Courier New', monospace" font-size="13"
    fill="#8b949e" text-anchor="middle">Full Stack Dev · BDD · TypeScript · Node.js</text>

  <!-- Cursor blink (static) -->
  <rect x="618" y="107" width="10" height="20" fill="#3fb950" opacity="0.9"/>

  <!-- Bottom accent line -->
  <rect x="0" y="196" width="860" height="4" fill="#3fb950" opacity="0.6"/>

  <!-- Corner decorations -->
  <text x="810" y="190" font-family="monospace" font-size="10" fill="#3d4a5c">v2.0.1</text>
  <text x="15" y="190" font-family="monospace" font-size="10" fill="#3d4a5c">1011000101010</text>
</svg>
